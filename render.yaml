services:
  - type: web
    name: myagent-community-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health/ready
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: 3.0.0
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: SEED_DEMO_USER
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: myagent-community-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        value: "*.onrender.com"
      - key: DEFAULT_PROVIDER
        value: mock
      - key: PROVIDER_FALLBACKS
        value: mock
      - key: FEATURE_TOOLS
        value: "true"
      - key: FEATURE_RAG
        value: "false"

databases:
  - name: myagent-community-db
    databaseName: myagent
    user: myagent
