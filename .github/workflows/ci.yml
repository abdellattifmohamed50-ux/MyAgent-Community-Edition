name: MyAgent Community Edition v3 quality gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: myagent-v3-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  engine-sqlite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: MyAgent-Engine
    env:
      ENVIRONMENT: testing
      API_PORT: "8000"
      DATABASE_URL: sqlite+aiosqlite:///./ci.db
      AUTO_CREATE_TABLES: "false"
      SEED_DEMO_USER: "false"
      SECRET_KEY: ci-secret-key-with-more-than-32-characters
      JWT_SECRET: ci-jwt-secret-with-more-than-32-characters
      CORS_ORIGINS: http://localhost
      TRUSTED_HOSTS: testserver,localhost
      DEFAULT_PROVIDER: mock
      FEATURE_RAG: "false"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: MyAgent-Engine/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pip check
      - run: alembic upgrade head
      - run: ruff format --check . ../scripts/*.py
      - run: ruff check . ../scripts/*.py
      - run: mypy core apps agents services repositories models tests ../scripts/*.py
      - run: python -m compileall -q apps core agents services repositories models
      - run: python ../scripts/generate-openapi.py && git diff --exit-code -- ../docs/openapi.json
      - run: >-
          pytest -q
          --cov=apps --cov=core --cov=agents --cov=services
          --cov=repositories --cov=models
          --cov-report=term-missing --cov-report=xml:coverage.xml
          --cov-fail-under=84
      - run: bandit -q -r apps core agents services repositories models
      - run: pip-audit -r requirements.txt --strict

  engine-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: myagent_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci_only_password
        options: >-
          --health-cmd "pg_isready -U postgres -d myagent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        ports:
          - 5432:5432
    env:
      ENVIRONMENT: testing
      API_PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://postgres:ci_only_password@localhost:5432/myagent_test
      AUTO_CREATE_TABLES: "false"
      SEED_DEMO_USER: "false"
      SECRET_KEY: ci-secret-key-with-more-than-32-characters
      JWT_SECRET: ci-jwt-secret-with-more-than-32-characters
      CORS_ORIGINS: http://localhost
      TRUSTED_HOSTS: testserver,localhost
      DEFAULT_PROVIDER: mock
      FEATURE_RAG: "false"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: MyAgent-Engine/requirements.txt
      - run: python -m pip install --upgrade pip && pip install -r MyAgent-Engine/requirements.txt
      - run: cd MyAgent-Engine && alembic upgrade head
      - run: python scripts/postgres-smoke.py

  clients:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: MyAgent-Studio/package-lock.json
      - run: node --check MyAgent-Web/app.js && node --check MyAgent-Web/sw.js
      - run: node --check MyAgent-Studio/main.cjs && node --check MyAgent-Studio/preload.cjs && node --check MyAgent-Studio/offline.js
      - run: npm ci
        working-directory: MyAgent-Studio
      - run: npm audit --audit-level=high
        working-directory: MyAgent-Studio
      - run: npm run dist -- --linux dir
        working-directory: MyAgent-Studio
      - run: sh -n scripts/smoke-test.sh scripts/package-release.sh

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      POSTGRES_PASSWORD: compose_database_password
      SECRET_KEY: production-secret-key-with-more-than-32-characters
      JWT_SECRET: production-jwt-secret-with-more-than-32-characters
      CORS_ORIGINS: https://app.example.com
      TRUSTED_HOSTS: localhost,127.0.0.1,engine,web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - run: docker compose config --quiet
      - run: docker compose -f docker-compose.production.yml config --quiet
      - run: docker build -t myagent-community-engine:test .
      - run: docker build -t myagent-community-web:test MyAgent-Web
      - name: Community SQLite compose smoke
        run: |
          docker compose up --build -d --wait --wait-timeout 180
          ./scripts/smoke-test.sh
          docker compose down -v
      - name: Production PostgreSQL compose smoke and restart
        run: |
          docker compose -f docker-compose.production.yml up --build -d --wait --wait-timeout 240
          MYAGENT_API_URL=http://localhost:8080/api/v1 ./scripts/smoke-test.sh
          docker compose -f docker-compose.production.yml restart engine
          docker compose -f docker-compose.production.yml up -d --wait --wait-timeout 180
          MYAGENT_API_URL=http://localhost:8080/api/v1 ./scripts/smoke-test.sh
      - if: always()
        run: |
          echo "=== Container Status (docker ps -a) ==="
          docker ps -a || true
          echo "=== Docker Compose Status ==="
          docker compose ps || true
          docker compose -f docker-compose.production.yml ps || true
          echo "=== Container Health Logs ==="
          docker inspect --format='Container: {{.Name}} - Health: {{json .State.Health}}' $(docker ps -a -q) || true
          echo "=== Container Logs ==="
          docker compose logs --no-color || true
          docker compose -f docker-compose.production.yml logs --no-color || true
          docker compose down -v || true
          docker compose -f docker-compose.production.yml down -v || true

  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: MyAgent-Mobile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
